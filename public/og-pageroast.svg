<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#ff6b1a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1a1613;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8a47"/>
      <stop offset="100%" style="stop-color:#e85a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1613"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#fireGrad)"/>

  <!-- bilko.run branding top-left -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="24" fill="#6b5a49">bilko<tspan fill="#ff6b1a">.run</tspan></text>

  <!-- Main content -->
  <text x="600" y="200" text-anchor="middle" font-size="80" opacity="0.9">&#x1F525;</text>

  <text x="600" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">PageRoast</text>

  <text x="600" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="26" fill="#c4b49e">Get your landing page brutally roasted by AI</text>

  <!-- Score example -->
  <rect x="380" y="410" width="440" height="50" rx="12" fill="rgba(255,255,255,0.08)"/>
  <text x="600" y="443" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#ff8a47">Score 0-100  &#x2022;  Savage Roast  &#x2022;  Fixes  &#x2022;  Free</text>

  <!-- CTA -->
  <rect x="425" y="490" width="350" height="52" rx="14" fill="#ff6b1a"/>
  <text x="600" y="523" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="20" fill="white">Try it free</text>

  <!-- Bottom -->
  <text x="600" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16" fill="#4a3d33">bilko.run/projects/page-roast</text>
</svg>
