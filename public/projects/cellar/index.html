    <title>Cellar — by Bilko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bilko_cellar_theme');
          if (t === 'light' || t === 'dark' || t === 'hc' || t === 'cb') {
            document.documentElement.dataset.theme = t;
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.dataset.theme = 'dark';
          }
          // v0.8: hydrate cellar look (theme/size/style/texture) before paint.
          var lookRaw = localStorage.getItem('bilko_cellar_look_v1');
          var look = lookRaw ? JSON.parse(lookRaw) : {};
          var allowedThemes = { cellar: 1, parlor: 1, midnight: 1, paper: 1 };
          var allowedSizes = { compact: 1, medium: 1, generous: 1 };
          var allowedStyles = { classic: 1, modern: 1, mono: 1 };
          var allowedTex = { flat: 1, vignette: 1, grain: 1 };
          document.documentElement.dataset.cellarTheme = allowedThemes[look.theme] ? look.theme : 'cellar';
          document.documentElement.dataset.cardSize = allowedSizes[look.cardSize] ? look.cardSize : 'medium';
          document.documentElement.dataset.cardStyle = allowedStyles[look.cardStyle] ? look.cardStyle : 'classic';
          document.documentElement.dataset.tableTexture = allowedTex[look.tableTexture] ? look.tableTexture : 'vignette';
        } catch (e) {}
      })();
    </script>
    <style>
      /* Critical-path CSS — paints the layout shell before the main bundle
         loads. Prevents a flash of unstyled content. Keep TINY (<1 KB gz).
         v0.8: paints the cellar wood backdrop immediately so there's no
         flash of white before the deferred stylesheet arrives. */
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        background: #1a120c;
        color: #f5ebd6;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      html[data-cellar-theme="parlor"] body { background: #0e1f1a; color: #ecf0eb; }
      html[data-cellar-theme="midnight"] body { background: #0c1220; color: #e4ebf4; }
      html[data-cellar-theme="paper"] body { background: #efe9dd; color: #2a1f15; }
      html[data-theme="light"] body { background: #ffffff; color: #1c1c1e; }
      html[data-theme="dark"] body { background: #0c0c0d; color: #f2f2f7; }
      html[data-theme="hc"] body { background: #ffffff; color: #000000; }
      #root > div.min-h-screen {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      #root > div.min-h-screen > header {
        padding: 18px 28px 14px;
        border-bottom: 1px solid rgba(245,235,214,0.10);
        flex-shrink: 0;
      }
      #root > div.min-h-screen > main {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .ce-hud {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        min-height: 40px;
      }
    </style>
