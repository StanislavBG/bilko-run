    <!-- Anti-FOUC: read persisted theme settings before any CSS renders -->
    <script>
    (function () {
      try {
        var t = localStorage.getItem('bilko_etch_theme_v1');
        if (t === '"light"') document.documentElement.dataset.theme = 'light';
        else if (t === '"dark"') document.documentElement.dataset.theme = 'dark';
        if (localStorage.getItem('bilko_etch_cb_v1') === 'true') document.documentElement.dataset.cb = '1';
        if (localStorage.getItem('bilko_etch_hc_v1') === 'true') document.documentElement.dataset.hc = '1';
      } catch (e) {}
    })();
    </script>
