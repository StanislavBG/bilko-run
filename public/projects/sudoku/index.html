<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/projects/sudoku/favicon.svg" />
    <link rel="apple-touch-icon" href="/projects/sudoku/icon-192.png" />
    <link rel="manifest" href="/projects/sudoku/manifest.webmanifest" />
    <meta name="theme-color" content="#f3ede1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sudoku · A clean, calm, free Sudoku — by Bilko." />
    <title>Sudoku · Bilko</title>
    <!-- v0.9 fonts: Fraunces (numbers), Newsreader (alt serif), Inter (UI). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400..700&display=swap" rel="stylesheet" />
    <!--
      Critical-path CSS. Inlining the above-the-fold paint (page background,
      title bar baseline, 9x9 grid placeholder dimensions, numpad row) lets
      the first frame appear before the main CSS chunk parses. The full
      stylesheet (Tailwind + theme + per-component) lands as a normal
      <link> via Vite's emitted index-*.css.
    -->
    <style>
      /* v0.9 critical-path CSS. Paper is the default; the other themes
         override on the <html> data-theme attribute set by the boot script. */
      :root { --paper: #fbf7ee; --bg: #f3ede1; --bg-deep: #ebe3d3; --ink: #1a1814; }
      [data-theme="paper"] { --paper: #fbf7ee; --bg: #f3ede1; --bg-deep: #ebe3d3; --ink: #1a1814; }
      [data-theme="ink"] { --paper: #f7f1e1; --bg: #efe9da; --bg-deep: #e3dcc8; --ink: #1a1814; }
      [data-theme="dark-v9"] { --paper: #1b1e24; --bg: #14161a; --bg-deep: #0e1014; --ink: #e8ebf2; }
      [data-theme="light"] { --paper: #ffffff; --bg: #f7f7f7; --bg-deep: #f7f7f7; --ink: #1c1c1e; }
      [data-theme="dark"] { --paper: #0a0a0c; --bg: #0a0a0c; --bg-deep: #0a0a0c; --ink: #f0f0f2; }
      [data-theme="sepia"] { --paper: #f4ecd8; --bg: #f4ecd8; --bg-deep: #f4ecd8; --ink: #3a2f1f; }
      [data-theme="hc"] { --paper: #ffffff; --bg: #ffffff; --bg-deep: #ffffff; --ink: #000000; }
      html { background: radial-gradient(1200px 600px at 50% -10%, var(--bg) 0%, var(--bg-deep) 70%), var(--bg-deep); color: var(--ink); }
      body { margin: 0; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      .sudoku-app-root { min-height: 100vh; }
      .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); aspect-ratio: 1 / 1; margin: 0 auto; }
      .sudoku-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bilko_sudoku_theme_v1');
          var valid = { light:1, dark:1, sepia:1, hc:1, paper:1, ink:1, 'dark-v9':1 };
          // v0.9: paper is the default for fresh installs.
          if (!t || !valid[t]) t = 'paper';
          document.documentElement.dataset.theme = t;
          if (localStorage.getItem('bilko_sudoku_cb_v1') === '1') document.documentElement.dataset.cb = '1';
        } catch (e) {}
      })();
      // Defer SW registration to idle so it never blocks first paint.
      // Skip on localhost dev — vite HMR + SW caching fight each other.
      if ('serviceWorker' in navigator && !/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) {
        window.addEventListener('load', function () {
          (window.requestIdleCallback || window.setTimeout)(function () {
            navigator.serviceWorker.register('/projects/sudoku/sw.js', { scope: '/projects/sudoku/' }).catch(function () {});
          }, { timeout: 2000 });
        });
      }
    </script>
    <script type="module" crossorigin src="/projects/sudoku/assets/index-BFpt3bHu.js"></script>
    <link rel="stylesheet" crossorigin href="/projects/sudoku/assets/index-DOrt6kGZ.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
