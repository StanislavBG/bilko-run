<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/projects/sudoku/favicon.svg" />
    <link rel="apple-touch-icon" href="/projects/sudoku/icon-192.png" />
    <link rel="manifest" href="/projects/sudoku/manifest.webmanifest" />
    <meta name="theme-color" content="#007aff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sudoku · A clean, calm, free Sudoku — by Bilko." />
    <title>Sudoku · Bilko</title>
    <!--
      Critical-path CSS. Inlining the above-the-fold paint (page background,
      title bar baseline, 9x9 grid placeholder dimensions, numpad row) lets
      the first frame appear before the main CSS chunk parses. The full
      stylesheet (Tailwind + theme + per-component) lands as a normal
      <link> via Vite's emitted index-*.css.
    -->
    <style>
      :root { --paper: #f7f7f7; --ink: #1c1c1e; }
      [data-theme="dark"] { --paper: #0a0a0c; --ink: #f0f0f2; }
      [data-theme="sepia"] { --paper: #f4ecd8; --ink: #3a2f1f; }
      [data-theme="hc"] { --paper: #ffffff; --ink: #000000; }
      html { background: var(--paper); color: var(--ink); }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      /* Skeleton-shaped placeholder so the first frame already paints
         the grid silhouette before the main JS hydrates. */
      .sudoku-app-root { min-height: 100vh; }
      .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); aspect-ratio: 1 / 1; max-width: min(92vw, 540px); margin: 0 auto; }
      .sudoku-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bilko_sudoku_theme_v1');
          if (t === 'light' || t === 'dark' || t === 'sepia' || t === 'hc') document.documentElement.dataset.theme = t;
          if (localStorage.getItem('bilko_sudoku_cb_v1') === '1') document.documentElement.dataset.cb = '1';
        } catch (e) {}
      })();
      // Defer SW registration to idle so it never blocks first paint.
      // Skip on localhost dev — vite HMR + SW caching fight each other.
      if ('serviceWorker' in navigator && !/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) {
        window.addEventListener('load', function () {
          (window.requestIdleCallback || window.setTimeout)(function () {
            navigator.serviceWorker.register('/projects/sudoku/sw.js', { scope: '/projects/sudoku/' }).catch(function () {});
          }, { timeout: 2000 });
        });
      }
    </script>
    <script type="module" crossorigin src="/projects/sudoku/assets/index-BkX3aqJ4.js"></script>
    <link rel="stylesheet" crossorigin href="/projects/sudoku/assets/index-CDcQOWNo.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
